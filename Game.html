<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport settings strictly designed to block zooming and scrolling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Sandbox</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            touch-action: none; /* Prevents default browser swiping */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            user-select: none;
            -webkit-user-select: none;
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
            image-rendering: pixelated; 
        }
        
        /* Heads Up Display */
        #ui { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            color: white; 
            text-shadow: 1px 1px 3px black; 
            pointer-events: none; 
            z-index: 10;
        }
        #ui h2 { margin: 0 0 5px 0; font-size: 20px; color: #FFD700; }
        #ui p { margin: 0; font-size: 14px; color: #ddd; }

        /* Mobile Touch Controls - UI Setup */
        .touch-zone {
            position: absolute;
            z-index: 5;
        }
        #dpad {
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #dpad-knob {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
        }
        .action-btn {
            bottom: 40px;
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #jump-btn { right: 30px; }
        #build-btn { right: 120px; bottom: 80px; }
        
        /* Toolbar */
        #toolbar {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 10;
        }
        .slot {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.5);
            border: 2px solid #555;
            box-sizing: border-box;
        }
        .slot.active { border-color: #FFD700; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Pocket Sandbox</h2>
        <p id="coords">X: 0 | Y: 0</p>
        <p>Day / Night Cycle Active</p>
    </div>

    <!-- UI Overlay for mobile -->
    <div id="dpad" class="touch-zone"><div id="dpad-knob"></div></div>
    <div id="jump-btn" class="touch-zone action-btn">JUMP</div>
    <div id="build-btn" class="touch-zone action-btn">MINE</div>

    <div id="toolbar"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Dynamic resizing to fit screen perfectly
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- GAME CONSTANTS ---
        const TILE_SIZE = 32; // Standard tile scale
        const MAP_WIDTH = 250;
        const MAP_HEIGHT = 150;
        const GRAVITY = 0.6;
        const TERMINAL_VELOCITY = 15;

        // Block Dictionary
        const BLOCKS = {
            AIR: 0,
            GRASS: 1,
            DIRT: 2,
            STONE: 3,
            WOOD: 4,
            LEAVES: 5,
            BEDROCK: 6,
            PLANKS: 7
        };

        // Visual mapping for rendering
        const BLOCK_COLORS = {
            [BLOCKS.GRASS]: '#4CAF50',
            [BLOCKS.DIRT]: '#795548',
            [BLOCKS.STONE]: '#9E9E9E',
            [BLOCKS.WOOD]: '#5D4037',
            [BLOCKS.LEAVES]: 'rgba(46, 125, 50, 0.8)', // Semi-transparent
            [BLOCKS.BEDROCK]: '#212121',
            [BLOCKS.PLANKS]: '#8D6E63'
        };

        // --- WORLD GENERATION ---
        // 2D Array initialized to Air
        let world = new Array(MAP_WIDTH).fill(0).map(() => new Array(MAP_HEIGHT).fill(BLOCKS.AIR));
        let surfaceHeights = [];

        function generateWorld() {
            // Sine wave based terrain generation
            for (let x = 0; x < MAP_WIDTH; x++) {
                // Combine a few sine waves for rolling, organic hills
                let height = Math.floor(MAP_HEIGHT / 3 + Math.sin(x * 0.1) * 6 + Math.cos(x * 0.04) * 4);
                surfaceHeights[x] = height;
                
                for (let y = 0; y < MAP_HEIGHT; y++) {
                    if (y === MAP_HEIGHT - 1) {
                        world[x][y] = BLOCKS.BEDROCK;
                    } else if (y > height + Math.floor(Math.random() * 3) + 4) {
                        // Deep underground
                        world[x][y] = BLOCKS.STONE;
                    } else if (y > height) {
                        // Sub-surface
                        world[x][y] = BLOCKS.DIRT;
                    } else if (y === height) {
                        // Surface
                        world[x][y] = BLOCKS.GRASS;
                    }
                }
            }

            // Tree Generation
            for (let x = 5; x < MAP_WIDTH - 5; x++) {
                if (Math.random() < 0.08 && surfaceHeights[x] > 10) {
                    let h = surfaceHeights[x];
                    // Ensure tree has room to spawn
                    if (world[x][h] === BLOCKS.GRASS) {
                        // Wood Trunk
                        let treeHeight = Math.floor(Math.random() * 3) + 4;
                        for (let i = 1; i <= treeHeight; i++) {
                            world[x][h - i] = BLOCKS.WOOD;
                        }
                        // Leaves Canopy
                        for (let lx = -2; lx <= 2; lx++) {
                            for (let ly = -treeHeight - 2; ly <= -treeHeight + 1; ly++) {
                                // Round the corners of the canopy
                                if (Math.abs(lx) === 2 && (ly === -treeHeight - 2 || ly === -treeHeight + 1)) continue; 
                                if (world[x + lx][h + ly] === BLOCKS.AIR) {
                                    world[x + lx][h + ly] = BLOCKS.LEAVES;
                                }
                            }
                        }
                    }
                }
            }
        }
        generateWorld();

        // --- CAMERA SYSTEM ---
        const camera = {
            x: 0,
            y: 0,
            
            update: function(targetX, targetY) {
                // Lerp (smooth follow) the target
                this.x += (targetX - (canvas.width / 2) - this.x) * 0.1;
                this.y += (targetY - (canvas.height / 2) - this.y) * 0.1;
                
                // Clamp camera to world boundaries so we don't see the void
                this.x = Math.max(0, Math.min(this.x, MAP_WIDTH * TILE_SIZE - canvas.width));
                this.y = Math.max(0, Math.min(this.y, MAP_HEIGHT * TILE_SIZE - canvas.height));
            }
        };

        // --- RENDER ENGINE ---
        let timeOfDay = 8000; // Start in the morning
        
        function drawSky() {
            timeOfDay += 2;
            if (timeOfDay > 24000) timeOfDay = 0;

            let skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            
            if (timeOfDay > 6000 && timeOfDay < 18000) { // Day
                skyGradient.addColorStop(0, '#64B5F6');
                skyGradient.addColorStop(1, '#E3F2FD');
            } else if (timeOfDay > 4000 && timeOfDay <= 6000) { // Sunrise
                skyGradient.addColorStop(0, '#FFB74D');
                skyGradient.addColorStop(1, '#FFF3E0');
            } else if (timeOfDay >= 18000 && timeOfDay < 20000) { // Sunset
                skyGradient.addColorStop(0, '#9575CD');
                skyGradient.addColorStop(1, '#FFAB91');
            } else { // Night
                skyGradient.addColorStop(0, '#0D47A1');
                skyGradient.addColorStop(1, '#1A237E');
            }

            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawWorld() {
            drawSky();

            // Culling logic: Only calculate and draw blocks currently visible on screen
            let startCol = Math.floor(camera.x / TILE_SIZE);
            let endCol = startCol + Math.ceil(canvas.width / TILE_SIZE) + 1;
            let startRow = Math.floor(camera.y / TILE_SIZE);
            let endRow = startRow + Math.ceil(canvas.height / TILE_SIZE) + 1;

            startCol = Math.max(0, startCol);
            endCol = Math.min(MAP_WIDTH, endCol);
            startRow = Math.max(0, startRow);
            endRow = Math.min(MAP_HEIGHT, endRow);

            for (let x = startCol; x < endCol; x++) {
                for (let y = startRow; y < endRow; y++) {
                    let block = world[x][y];
                    if (block !== BLOCKS.AIR) {
                        let renderX = Math.floor(x * TILE_SIZE - camera.x);
                        let renderY = Math.floor(y * TILE_SIZE - camera.y);
                        
                        ctx.fillStyle = BLOCK_COLORS[block];
                        ctx.fillRect(renderX, renderY, TILE_SIZE, TILE_SIZE);
                        
                        // Inner border for block definition
                        ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
                        ctx.strokeRect(renderX, renderY, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
        }
        // --- PLAYER & PHYSICS ---
        const player = {
            x: (MAP_WIDTH / 2) * TILE_SIZE,
            y: 0, // Will fall from sky
            width: 24,
            height: 58, // Tall enough to look human-ish
            velX: 0,
            velY: 0,
            speed: 5,
            jumpForce: -12,
            grounded: false,
            inventory: [BLOCKS.DIRT, BLOCKS.STONE, BLOCKS.WOOD, BLOCKS.PLANKS],
            selectedSlot: 0,

            draw: function() {
                let rx = Math.floor(this.x - camera.x);
                let ry = Math.floor(this.y - camera.y);
                
                // Body
                ctx.fillStyle = '#E91E63'; // Bright Pink for visibility
                ctx.fillRect(rx, ry, this.width, this.height);
                
                // Face/Direction indicator
                ctx.fillStyle = 'white';
                let eyeOffset = this.velX >= 0 ? 15 : 4;
                ctx.fillRect(rx + eyeOffset, ry + 10, 5, 5);
            },

            update: function() {
                // Apply Gravity
                this.velY += GRAVITY;
                if (this.velY > TERMINAL_VELOCITY) this.velY = TERMINAL_VELOCITY;

                // Move X and check collisions
                this.x += this.velX;
                this.checkCollisions(true);

                // Move Y and check collisions
                this.y += this.velY;
                this.checkCollisions(false);
            },

            checkCollisions: function(isX) {
                // Determine grid bounds to check
                let left = Math.floor(this.x / TILE_SIZE);
                let right = Math.floor((this.x + this.width) / TILE_SIZE);
                let top = Math.floor(this.y / TILE_SIZE);
                let bottom = Math.floor((this.y + this.height) / TILE_SIZE);

                for (let x = left; x <= right; x++) {
                    for (let y = top; y <= bottom; y++) {
                        // Check bounds
                        if (x < 0 || x >= MAP_WIDTH || y < 0 || y >= MAP_HEIGHT) continue;
                        
                        let block = world[x][y];
                        // Only collide with solid blocks (not air or leaves)
                        if (block !== BLOCKS.AIR && block !== BLOCKS.LEAVES) {
                            if (isX) {
                                if (this.velX > 0) this.x = x * TILE_SIZE - this.width;
                                if (this.velX < 0) this.x = (x + 1) * TILE_SIZE;
                                this.velX = 0;
                            } else {
                                if (this.velY > 0) {
                                    this.y = y * TILE_SIZE - this.height;
                                    this.grounded = true;
                                }
                                if (this.velY < 0) this.y = (y + 1) * TILE_SIZE;
                                this.velY = 0;
                            }
                        }
                    }
                }
            }
        };

        // --- TOUCH INPUT LOGIC ---
        const dpad = document.getElementById('dpad');
        const knob = document.getElementById('dpad-knob');
        let dpadActive = false;

        dpad.addEventListener('touchstart', (e) => { dpadActive = true; handleDpad(e); }, {passive: false});
        dpad.addEventListener('touchmove', (e) => { handleDpad(e); }, {passive: false});
        dpad.addEventListener('touchend', () => { 
            dpadActive = false; 
            player.velX = 0; 
            knob.style.transform = `translate(0, 0)`;
        });

        function handleDpad(e) {
            if (!dpadActive) return;
            const touch = e.touches[0];
            const rect = dpad.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const deltaX = touch.clientX - centerX;
            
            // Normalize movement
            let moveDir = Math.max(-1, Math.min(1, deltaX / 40));
            player.velX = moveDir * player.speed;
            knob.style.transform = `translate(${moveDir * 30}px, 0)`;
            e.preventDefault();
        }

        document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
            if (player.grounded) {
                player.velY = player.jumpForce;
                player.grounded = false;
            }
            e.preventDefault();
        });

        // --- MINING & PLACING ---
        document.getElementById('build-btn').addEventListener('touchstart', (e) => {
            // Find block in front of player
            let lookDir = player.velX >= 0 ? 1 : -1;
            let targetX = Math.floor((player.x + (player.width / 2) + (lookDir * TILE_SIZE)) / TILE_SIZE);
            let targetY = Math.floor((player.y + (player.height / 2)) / TILE_SIZE);

            if (world[targetX][targetY] !== BLOCKS.AIR && world[targetX][targetY] !== BLOCKS.BEDROCK) {
                world[targetX][targetY] = BLOCKS.AIR; // Mine
            } else if (world[targetX][targetY] === BLOCKS.AIR) {
                world[targetX][targetY] = player.inventory[player.selectedSlot]; // Place
            }
            e.preventDefault();
        });

        // Inventory UI Setup
        const toolbar = document.getElementById('toolbar');
        player.inventory.forEach((blockId, index) => {
            let slot = document.createElement('div');
            slot.className = 'slot' + (index === 0 ? ' active' : '');
            slot.style.backgroundColor = BLOCK_COLORS[blockId];
            slot.onclick = () => {
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                slot.classList.add('active');
                player.selectedSlot = index;
            };
            toolbar.appendChild(slot);
        });

        // --- MAIN GAME LOOP ---
        function update() {
            player.update();
            camera.update(player.x, player.y);
            
            // Update UI
            document.getElementById('coords').innerText = 
                `X: ${Math.floor(player.x/TILE_SIZE)} | Y: ${Math.floor(player.y/TILE_SIZE)}`;
        }

        function loop() {
            update();
            drawWorld();
            player.draw();
            requestAnimationFrame(loop);
        }

        // Start the game
        loop();
    </script>
</body>
</html>
